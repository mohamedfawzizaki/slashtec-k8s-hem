name: CI/CD Pipeline (Docker + GitOps)

on:
  push:
  branches: ["main"]

jobs:
  build-and-deploy:
  runs-on: ubuntu-latest

  steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set image tag
      id: vars
      run: echo "TAG=${GITHUB_SHA}" >> $GITHUB_OUTPUT

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: \${{ secrets.DOCKER_USERNAME }}
        password: \${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push image
      uses: docker/build-push-action@v5
      with:
        context: ./app
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/argocd-demo:${{ steps.vars.outputs.TAG }}

    - name: Update Helm values.yaml
      run: |
        sed -i "s/tag:.*/tag: \"${{ steps.vars.outputs.TAG }}\"/" argocd-demo-app/values.yaml

    - name: Commit and push changes
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add argocd-demo-app/values.yaml
        git commit -m "Update image tag to ${{ steps.vars.outputs.TAG }}"
        git push